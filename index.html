<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пошук турнірів — Smart Chess System®</title>
<style>
  :root{
    --bg:#161512; --panel:#1e1c19; --panel2:#262420; --border:#3a3733;
    --gold:#c9a24b; --gold-dim:#8a7238; --text:#eae6df; --text-dim:#a89f92;
    --green:#6b9e5e; --red:#b1584a;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:16px;}
  .wrap{max-width:1000px;margin:0 auto;}
  header{text-align:center;margin-bottom:20px;}
  header .brand{font-size:12px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px;}
  header h1{margin:0;font-size:22px;font-weight:700;
    background:linear-gradient(135deg,#e8d38a,#c9a24b);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  input[type=text]{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px;font-size:14px;}
  button{background:var(--gold);color:#161512;border:none;border-radius:8px;padding:10px 16px;
    font-weight:600;cursor:pointer;font-size:14px;}
  button:hover{background:#e8d38a;}
  .periods{margin-top:10px;}
  .periods button{background:var(--panel2);color:var(--text);border:1px solid var(--border);margin-right:6px;margin-bottom:6px;}
  .periods button.active{background:var(--gold);color:#161512;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;}
  th{color:var(--gold-dim);font-weight:600;font-size:11px;text-transform:uppercase;}
  a{color:var(--gold);text-decoration:none;}
  a:hover{text-decoration:underline;}
  .msg{color:var(--text-dim);font-size:13px;padding:8px 0;}
  .err{color:var(--red);}
  .sub{color:var(--text-dim);font-size:12px;}
  .place{font-weight:600;}
  .count{color:var(--text-dim);font-size:12px;margin-bottom:8px;}
  .hint{color:var(--text-dim);font-size:11px;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Smart Chess System®</div>
    <h1>Пошук турнірів гравця (chess-results.com)</h1>
  </header>

  <div class="panel">
    <div class="row">
      <input type="text" id="last" placeholder="Прізвище">
      <input type="text" id="first" placeholder="Ім'я (не обов'язково)">
      <button onclick="search()">Пошук</button>
    </div>
    <div class="periods">
      <button data-days="30" onclick="setPeriod(30,this)">Місяць</button>
      <button data-days="90" onclick="setPeriod(90,this)">3 місяці</button>
      <button data-days="182" onclick="setPeriod(182,this)">Півроку</button>
      <button data-days="365" onclick="setPeriod(365,this)">Рік</button>
      <button data-days="0" class="active" onclick="setPeriod(0,this)">Все</button>
    </div>
    <div class="hint">Для періодів (крім "Все") очки підвантажуються з таблиць турнірів окремо — це займає кілька секунд.</div>
  </div>

  <div class="panel" id="results">
    <div class="msg">Введіть прізвище і натисніть "Пошук"</div>
  </div>
</div>

<script>
let periodDays = 0;
let lastQuery = null;

function setPeriod(days, btn){
  periodDays = days;
  document.querySelectorAll('.periods button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(lastQuery) runSearch();
}

function parseDate(str){
  const m = /(\d{4})\/(\d{2})\/(\d{2})/.exec(str||"");
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]);
}

function formatDate(str){
  const d = parseDate(str);
  if(!d) return str || '-';
  return d.toLocaleDateString('uk-UA');
}

function search(){
  const last = document.getElementById('last').value.trim();
  const first = document.getElementById('first').value.trim();
  if(!last){
    document.getElementById('results').innerHTML = '<div class="msg err">Введіть прізвище</div>';
    return;
  }
  lastQuery = { last, first };
  runSearch();
}

async function runSearch(){
  const box = document.getElementById('results');
  const { last, first } = lastQuery;
  box.innerHTML = `<div class="msg">Шукаю${periodDays ? ' і підвантажую очки...' : '...'}</div>`;
  try{
    const params = new URLSearchParams({ last, first });
    if(periodDays) params.set('days', periodDays);
    const res = await fetch(`/.netlify/functions/cr-search?${params}`);
    const data = await res.json();
    if(data.error){
      box.innerHTML = `<div class="msg err">Помилка: ${data.error}</div>`;
      console.log('debug', data);
      return;
    }
    render(data.results || []);
  }catch(e){
    box.innerHTML = `<div class="msg err">Помилка запиту: ${e}</div>`;
  }
}

function render(results){
  const box = document.getElementById('results');
  if(!results.length){
    box.innerHTML = '<div class="msg">За обраний період турнірів не знайдено</div>';
    return;
  }

  results.sort((a,b)=>{
    const da = parseDate(a.date), db = parseDate(b.date);
    if(!da || !db) return 0;
    return db - da;
  });

  let html = `<div class="count">Знайдено: ${results.length}</div>`;
  html += '<table><tr><th>Дата</th><th>Турнір</th><th>Гравець / Клуб</th><th>Місце</th><th>Очки</th></tr>';
  for(const r of results){
    const tName = r.tournamentLink ? `<a href="https://chess-results.com/${r.tournamentLink}" target="_blank">${r.tournamentName}</a>` : r.tournamentName;
    const pointsCell = r.points !== null && r.points !== undefined ? r.points : `<span class="sub">${r.roundsPlayed||''} тур.</span>`;
    html += `<tr>
      <td>${formatDate(r.date)}</td>
      <td>${tName}</td>
      <td>${r.name}<div class="sub">${r.club||''}${r.club&&r.fed?' · ':''}${r.fed||''}</div></td>
      <td class="place">${r.place}${r.participants?` / ${r.participants}`:''}</td>
      <td>${pointsCell}</td>
    </tr>`;
  }
  html += '</table>';
  box.innerHTML = html;
}
</script>
</body>
</html>
