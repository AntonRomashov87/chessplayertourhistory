<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пошук турнірів — Smart Chess System®</title>
<style>
  :root{
    --bg:#161512; --panel:#1e1c19; --panel2:#262420; --border:#3a3733;
    --gold:#c9a24b; --gold-dim:#8a7238; --text:#eae6df; --text-dim:#a89f92;
    --green:#6b9e5e; --red:#b1584a;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:16px;}
  .wrap{max-width:900px;margin:0 auto;}
  header{text-align:center;margin-bottom:20px;}
  header .brand{font-size:12px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px;}
  header h1{margin:0;font-size:22px;font-weight:700;
    background:linear-gradient(135deg,#e8d38a,#c9a24b);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  input[type=text]{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px;font-size:14px;}
  button{background:var(--gold);color:#161512;border:none;border-radius:8px;padding:10px 16px;
    font-weight:600;cursor:pointer;font-size:14px;}
  button:hover{background:#e8d38a;}
  .periods{margin-top:10px;}
  .periods button{background:var(--panel2);color:var(--text);border:1px solid var(--border);margin-right:6px;}
  .periods button.active{background:var(--gold);color:#161512;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border);}
  th{color:var(--gold-dim);font-weight:600;font-size:12px;text-transform:uppercase;}
  a{color:var(--gold);}
  .msg{color:var(--text-dim);font-size:13px;padding:8px 0;}
  .err{color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Smart Chess System®</div>
    <h1>Пошук турнірів гравця (chess-results.com)</h1>
  </header>

  <div class="panel">
    <div class="row">
      <input type="text" id="last" placeholder="Прізвище">
      <input type="text" id="first" placeholder="Ім'я (не обов'язково)">
      <button onclick="search()">Пошук</button>
    </div>
    <div class="periods">
      <button data-days="30" class="active" onclick="setPeriod(30,this)">Місяць</button>
      <button data-days="182" onclick="setPeriod(182,this)">Півроку</button>
      <button data-days="365" onclick="setPeriod(365,this)">Рік</button>
      <button data-days="0" onclick="setPeriod(0,this)">Все</button>
    </div>
  </div>

  <div class="panel" id="results">
    <div class="msg">Введіть прізвище і натисніть "Пошук"</div>
  </div>
</div>

<script>
let periodDays = 30;
let lastResults = [];

function setPeriod(days, btn){
  periodDays = days;
  document.querySelectorAll('.periods button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function parseDate(str){
  const m = /(\d{2})\.(\d{2})\.(\d{4})/.exec(str||"");
  if(!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}

async function search(){
  const last = document.getElementById('last').value.trim();
  const first = document.getElementById('first').value.trim();
  const box = document.getElementById('results');
  if(!last){ box.innerHTML = '<div class="msg err">Введіть прізвище</div>'; return; }

  box.innerHTML = '<div class="msg">Шукаю...</div>';
  try{
    const res = await fetch(`/.netlify/functions/cr-search?last=${encodeURIComponent(last)}&first=${encodeURIComponent(first)}`);
    const data = await res.json();
    if(data.error){
      box.innerHTML = `<div class="msg err">Помилка: ${data.error}</div>`;
      console.log('debug', data);
      return;
    }
    lastResults = data.results || [];
    render();
  }catch(e){
    box.innerHTML = `<div class="msg err">Помилка запиту: ${e}</div>`;
  }
}

function render(){
  const box = document.getElementById('results');
  if(!lastResults.length){
    box.innerHTML = '<div class="msg">Нічого не знайдено</div>';
    return;
  }
  const now = new Date();
  const filtered = periodDays === 0 ? lastResults : lastResults.filter(r=>{
    const d = parseDate(r.date);
    if(!d) return true;
    return (now - d) / (1000*60*60*24) <= periodDays;
  });

  if(!filtered.length){
    box.innerHTML = '<div class="msg">За обраний період турнірів не знайдено</div>';
    return;
  }

  let html = '<table><tr><th>Дата</th><th>Турнір</th></tr>';
  for(const r of filtered){
    const name = r.tournamentName || r.cells.join(' / ');
    const link = r.tournamentLink ? `<a href="https://chess-results.com/${r.tournamentLink}" target="_blank">${name}</a>` : name;
    html += `<tr><td>${r.date||'-'}</td><td>${link}</td></tr>`;
  }
  html += '</table>';
  box.innerHTML = html;
}
</script>
</body>
</html>
